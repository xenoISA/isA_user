# =============================================================================
# Stub auth_service deployment for HPA scale-up integration test (#354)
# =============================================================================
# This manifest stands in for the real auth_service so the test can run
# against a kind/k3d cluster *without* building a 1+GB Docker image in CI.
# It is shaped to mirror the production deployment topology rendered by
# ``isA_Cloud/deployments/charts/isa-service``:
#
#   * One container exposing /health on a configurable port
#   * Resource requests low enough to fit on a single kind node
#   * HPA targeting CPU utilization with the same scaleUp/scaleDown
#     behavior as the production chart
#   * env vars POD_REPLICA_COUNT / DB_POOL_BASE / DB_POOL_GROWTH wired to
#     the same names ``core/postgres_client.py:compute_pool_size`` reads
#
# Replicating the real chart inline keeps the test hermetic — we don't
# pull from harbor.local, don't depend on the isA_Cloud chart layout, and
# don't need real Postgres / Consul to verify the scale path.
#
# Container image: ``python:3.11-slim`` running an inline asyncio server
# that:
#   * answers GET /health → 200 {"ok": true, "pool": <int>, "pod": <name>}
#   * computes ``pool`` using the same formula as
#     core.postgres_client.compute_pool_size, reading replica count from
#     POD_REPLICA_COUNT
#   * burns CPU on /work to make HPA scale up under load
# =============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: scale-up-test
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-stub-app
  namespace: scale-up-test
data:
  app.py: |
    """Inline stub modeled after microservices/auth_service/main.py.

    Implements just enough surface area to verify HPA scale-up + graceful
    drain. Mirrors the contract of ``core/graceful_shutdown.py`` so the
    test exercises the same SIGTERM-handling shape as production:

      GET /health -> 200 with computed Postgres pool size (always; matches
                     production middleware's _HEALTH_PATHS allowlist that
                     keeps /health responsive during shutdown)
      GET /ready  -> 200 normally, 503 once SIGTERM lands (controls the
                     readinessProbe and therefore Service endpoint
                     inclusion — kube-proxy stops routing within seconds)
      GET /work   -> 200 normally; 503 once SIGTERM lands AND grace
                     window expires (drains in-flight requests like the
                     production _ShutdownMiddleware)

    Why two endpoints? In production, ``core/graceful_shutdown.py``
    keeps ``/health`` answering 200 throughout shutdown (so the platform
    can tell the process is alive) but flips Consul/readiness so traffic
    stops being routed. The stub previously conflated the two on
    ``/health`` and made the whole pod look unhealthy during drain —
    masking real drain bugs and producing flaky transport-error spikes
    when port-forward latched onto a terminating pod (see #354 review).
    """
    import json
    import os
    import time
    import threading
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    # Mirror of core.postgres_client.compute_pool_size — duplicated here
    # because the stub container does not mount the repo. Keep the formula
    # in sync if compute_pool_size changes (test asserts equality against
    # the real function executed in pytest, not this copy).
    POOL_FLOOR = 5

    def compute_pool_size():
        replicas = max(1, int(os.environ.get("POD_REPLICA_COUNT", "1")))
        base = max(0, int(os.environ.get("DB_POOL_BASE", "2")))
        growth = max(0, int(os.environ.get("DB_POOL_GROWTH", "1")))
        return max(POOL_FLOOR, base + (replicas - 1) * growth)

    POD_NAME = os.environ.get("POD_NAME", "unknown")
    PORT = int(os.environ.get("SERVICE_PORT", "8201"))
    # Window between "readiness flips to NotReady" and "stop accepting new
    # work". Mirrors graceful_shutdown.GracefulShutdown.grace_period: the
    # production manager waits up to ~30s for in-flight to drain, so we
    # use 25s here to leave headroom under terminationGracePeriodSeconds.
    DRAIN_GRACE_SECONDS = float(os.environ.get("DRAIN_GRACE_SECONDS", "25"))
    SHUTTING_DOWN = False
    SHUTDOWN_AT = 0.0  # monotonic timestamp when SIGTERM landed
    IN_FLIGHT = 0
    IN_FLIGHT_LOCK = threading.Lock()

    def _drain_window_open():
        """True while we should still accept /work — within the grace
        period AND there are in-flight requests we don't want to abandon.
        Once the window closes, /work returns 503 (mirrors the production
        _ShutdownMiddleware rejecting new non-/health requests)."""
        if not SHUTTING_DOWN:
            return True
        return (time.monotonic() - SHUTDOWN_AT) < DRAIN_GRACE_SECONDS

    class Handler(BaseHTTPRequestHandler):
        # Force HTTP/1.1 so httpx keep-alive works — without this the
        # stdlib server defaults to HTTP/1.0, closing the socket after
        # every reply and exhausting the client's connection pool under
        # the load profile.
        protocol_version = "HTTP/1.1"

        # Quiet the default access log — kubelet hits probes every few
        # seconds and this fills the runner's pod log buffer.
        def log_message(self, *_):
            return

        def _reply(self, status, body=b""):
            """HTTP/1.1 needs explicit Content-Length on every reply or
            the client will hang waiting for EOF that never comes."""
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            # Force connection close on shutdown replies so clients
            # recycle their pool against the next pod (kube-proxy will
            # have already shifted endpoints by the time they reconnect).
            if SHUTTING_DOWN:
                self.send_header("Connection", "close")
            self.end_headers()
            if body:
                self.wfile.write(body)

        def do_GET(self):
            global IN_FLIGHT
            if self.path == "/health":
                # Always 200 — matches production graceful_shutdown
                # _HEALTH_PATHS allowlist. This is the *liveness* signal:
                # the process is alive and serving, even mid-drain.
                body = json.dumps({
                    "ok": True,
                    "pool": compute_pool_size(),
                    "pod": POD_NAME,
                    "shutting_down": SHUTTING_DOWN,
                }).encode()
                self._reply(200, body)
                return
            if self.path == "/ready":
                # Readiness flips to 503 the moment SIGTERM lands. The
                # readinessProbe picks this up within `periodSeconds`,
                # kubelet marks the Pod NotReady, the Service controller
                # removes the Pod from Endpoints, and kube-proxy stops
                # routing new work — *before* we cut off /work.
                if SHUTTING_DOWN:
                    self._reply(
                        503,
                        b'{"ready":false,"shutting_down":true}',
                    )
                    return
                self._reply(200, b'{"ready":true}')
                return
            if self.path == "/work":
                if not _drain_window_open():
                    # Grace window expired with new work still arriving
                    # — reject so the load gen records a 5xx if drain
                    # logic genuinely failed. Should not happen in the
                    # happy path because readiness flipped well before.
                    self._reply(503, b'{"draining":true}')
                    return
                with IN_FLIGHT_LOCK:
                    IN_FLIGHT += 1
                try:
                    # Burn ~50ms of CPU so a sustained load actually
                    # trips the HPA's CPU threshold on a kind node.
                    deadline = time.time() + 0.05
                    x = 0
                    while time.time() < deadline:
                        x = (x * 1103515245 + 12345) & 0x7FFFFFFF
                    self._reply(200, b'{"ok":true}')
                finally:
                    with IN_FLIGHT_LOCK:
                        IN_FLIGHT -= 1
                return
            self._reply(404, b'{"error":"not found"}')

    def _install_term_handler(server):
        import signal
        def handler(_signum, _frame):
            global SHUTTING_DOWN, SHUTDOWN_AT
            if SHUTTING_DOWN:
                return
            SHUTTING_DOWN = True
            SHUTDOWN_AT = time.monotonic()
            print(
                f"auth-stub SIGTERM received pod={POD_NAME} "
                f"in_flight={IN_FLIGHT} grace={DRAIN_GRACE_SECONDS}s",
                flush=True,
            )

            # Drain loop: wait for in-flight to reach 0 OR grace expires,
            # then close the listening socket so no further connections
            # are accepted. Existing keep-alive sockets continue serving
            # whatever's in flight via ThreadingHTTPServer's threads.
            def stop():
                deadline = time.monotonic() + DRAIN_GRACE_SECONDS
                while time.monotonic() < deadline:
                    with IN_FLIGHT_LOCK:
                        if IN_FLIGHT == 0:
                            break
                    time.sleep(0.1)
                # Final settle so any reply currently being written
                # finishes before we close the listening socket.
                time.sleep(0.5)
                print(
                    f"auth-stub draining complete pod={POD_NAME} "
                    f"final_in_flight={IN_FLIGHT}",
                    flush=True,
                )
                server.shutdown()
            threading.Thread(target=stop, daemon=True).start()
        signal.signal(signal.SIGTERM, handler)
        signal.signal(signal.SIGINT, handler)

    if __name__ == "__main__":
        srv = ThreadingHTTPServer(("0.0.0.0", PORT), Handler)
        _install_term_handler(srv)
        print(f"auth-stub listening on :{PORT} pod={POD_NAME}", flush=True)
        srv.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-stub
  namespace: scale-up-test
  labels:
    app: auth-stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-stub
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth-stub
    spec:
      # Generous drain window. Budget:
      #   * preStop sleep    ~10s  (lets kube-proxy drop us from endpoints
      #                              before the SIGTERM-driven drain begins)
      #   * graceful_shutdown ~25s (DRAIN_GRACE_SECONDS in app.py — wait
      #                              for in-flight to finish, then close
      #                              the listening socket)
      #   * safety margin    ~10s  (slow CPU on a kind node + reply write)
      # Total ~45s, so we set 60s. Production charts use 30s but they
      # don't have a 50ms-per-request CPU burner mixed with port-forward
      # latency on top.
      terminationGracePeriodSeconds: 60
      containers:
      - name: auth-stub
        image: python:3.11-slim
        command: ["python", "/app/app.py"]
        ports:
        - name: http
          containerPort: 8201
        env:
        - name: SERVICE_PORT
          value: "8201"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        # These three drive core/postgres_client.py:compute_pool_size
        # — the test patches POD_REPLICA_COUNT after each scale event and
        # re-asserts the per-pod pool stays within the budget.
        - name: POD_REPLICA_COUNT
          value: "1"
        - name: DB_POOL_BASE
          value: "2"
        - name: DB_POOL_GROWTH
          value: "1"
        # Per-pod drain grace. Must be < terminationGracePeriodSeconds
        # minus the preStop sleep so the kubelet doesn't SIGKILL while
        # the stub is still draining.
        - name: DRAIN_GRACE_SECONDS
          value: "25"
        resources:
          requests:
            # Tiny enough to fit ~5 replicas on a single kind node, large
            # enough that ``utilization = used/requested`` actually crosses
            # the HPA threshold under the load profile.
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        # Canonical Kubernetes "shutdown without dropping requests"
        # pattern: a preStop sleep that runs *before* SIGTERM so the
        # Service controller has time to remove this Pod from the
        # endpoints set. Without this, the SIGTERM and the endpoint
        # propagation race — kube-proxy may keep routing new traffic
        # to a pod that already started draining, producing the spurious
        # 5xx / transport-error spikes that originally tripped the
        # transport_error<=10% drain budget on this test.
        # See: https://learnk8s.io/graceful-shutdown
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 10"]
        readinessProbe:
          # /ready flips to 503 the moment SIGTERM lands, so kubelet
          # marks the Pod NotReady within one probe cycle and the
          # Service controller drops it from endpoints. /health stays
          # 200 throughout — that's what production graceful_shutdown
          # does, and it lets the load gen distinguish "process alive
          # but draining" from "process dead".
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 1
          periodSeconds: 2
          failureThreshold: 2
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: app
          mountPath: /app
      volumes:
      - name: app
        configMap:
          name: auth-stub-app
---
apiVersion: v1
kind: Service
metadata:
  name: auth-stub
  namespace: scale-up-test
spec:
  type: ClusterIP
  selector:
    app: auth-stub
  ports:
  - name: http
    port: 8201
    targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-stub
  namespace: scale-up-test
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-stub
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  behavior:
    # Mirror the production chart: scale up immediately, scale down with
    # a 5-min stabilization window. The test override scales down manually
    # via ``kubectl scale`` so we don't have to wait through the window.
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 4
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
