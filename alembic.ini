# Alembic configuration for isA_user platform
#
# Usage:
#   alembic -x service=account_service upgrade head
#   alembic -x service=auth_service downgrade -1
#   alembic -x service=payment_service revision -m "add_column"
#
# The -x service=<name> flag is REQUIRED for all commands.
# Each service has its own version history under:
#   microservices/<service>/alembic/versions/

[alembic]
script_location = alembic
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
