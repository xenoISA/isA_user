# =============================================================================
# Deployment Pipeline
# =============================================================================
# Handles deployment to staging and production environments.
#
# Triggers:
#   - Push to 'release/*' branches -> Staging
#   - Manual workflow dispatch -> Staging or Production
#   - Tags 'v*' -> Production (with approval)
# =============================================================================

name: Deploy

on:
  push:
    branches:
      - 'release/*'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      services:
        description: 'Services to deploy (comma-separated short names or *_service dirs, or "all")'
        required: true
        default: 'all'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ===========================================================================
  # Prepare Deployment
  # ===========================================================================
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      services: ${{ steps.set-services.outputs.services }}
      version: ${{ steps.set-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Environment
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Determine Services
        id: set-services
        run: |
          if [[ "${{ github.event.inputs.services }}" == "all" ]] || [[ -z "${{ github.event.inputs.services }}" ]]; then
            services=$(python core/deployment_targets.py --list-service-dirs --format csv)
          else
            services=$(python core/deployment_targets.py --normalize-list "${{ github.event.inputs.services }}" --format csv)
          fi
          echo "services=$services" >> $GITHUB_OUTPUT

      - name: Set Version
        id: set-version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            version="${{ github.ref_name }}"
          else
            version="${{ github.sha }}"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Build and Push Images
  # ===========================================================================
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Base Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/base:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Service Images
        run: |
          resolve_target() {
            while IFS='=' read -r key value; do
              printf -v "$key" '%s' "$value"
            done < <(python core/deployment_targets.py "$1" --format env)
          }

          IFS=',' read -ra SERVICES <<< "${{ needs.prepare.outputs.services }}"
          for service in "${SERVICES[@]}"; do
            resolve_target "$service"

            echo "Building ${TARGET_SERVICE_DIR} -> image ${TARGET_IMAGE_NAME}..."
            docker build \
              --build-arg BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/base:${{ needs.prepare.outputs.version }} \
              -f deployment/docker/Dockerfile.microservice \
              --build-arg SERVICE_NAME=$TARGET_SERVICE_DIR \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${TARGET_IMAGE_NAME}:${{ needs.prepare.outputs.version }} \
              .
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${TARGET_IMAGE_NAME}:${{ needs.prepare.outputs.version }}
          done

  # ===========================================================================
  # Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'staging'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      # ---------------------------------------------------------------------
      # Pre-deploy Alembic migration gate (issue #349)
      # ---------------------------------------------------------------------
      # Helm fires deployment/helm/templates/migration-job.yaml as a
      # `pre-install,pre-upgrade` hook. With `--wait`, this command blocks
      # until the Job reports `Complete`. A failed Job aborts the upgrade
      # and surfaces a non-zero exit, which fails the workflow loudly.
      # Existing service replicas (managed by the separate isa-service
      # chart) keep serving traffic since their Deployments are NOT
      # touched until this gate passes.
      # ---------------------------------------------------------------------
      - name: Pre-deploy schema migration gate
        run: |
          NAMESPACE=$(python core/deployment_targets.py --namespace staging)
          VERSION="${{ needs.prepare.outputs.version }}"

          echo "Running Alembic migration Job before service rollout..."
          helm upgrade --install isa-user-migrations ./deployment/helm \
            -f ./deployment/helm/values-staging.yaml \
            --set "migrationJob.image.registry=${{ env.REGISTRY }}" \
            --set "migrationJob.image.repository=${{ env.IMAGE_PREFIX }}/base" \
            --set "migrationJob.image.tag=${VERSION}" \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --wait \
            --timeout 15m

      - name: Capture migration Job logs
        if: always()
        run: |
          NAMESPACE=$(python core/deployment_targets.py --namespace staging)
          echo "::group::Migration Job logs"
          # Most recent migration Job (sorted by creation timestamp)
          JOB=$(kubectl get jobs -n "$NAMESPACE" \
            -l app.kubernetes.io/name=isa-user-migrations \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1:].metadata.name}' 2>/dev/null || true)
          if [ -n "$JOB" ]; then
            echo "Logs for job/$JOB:"
            kubectl logs -n "$NAMESPACE" "job/$JOB" --tail=500 || true
          else
            echo "No migration Job found in namespace $NAMESPACE."
          fi
          echo "::endgroup::"

      - name: Deploy Services
        run: |
          resolve_target() {
            while IFS='=' read -r key value; do
              printf -v "$key" '%s' "$value"
            done < <(python core/deployment_targets.py "$1" --format env)
          }

          NAMESPACE=$(python core/deployment_targets.py --namespace staging)
          VERSION="${{ needs.prepare.outputs.version }}"

          IFS=',' read -ra SERVICES <<< "${{ needs.prepare.outputs.services }}"
          for service in "${SERVICES[@]}"; do
            resolve_target "$service"

            echo "Deploying ${TARGET_SERVICE_DIR} to staging via ${TARGET_DEPLOYMENT_NAME}..."

            echo "Validate rollout target ${TARGET_DEPLOYMENT_NAME}/${TARGET_CONTAINER_NAME}..."
            if ! kubectl get deployment "${TARGET_DEPLOYMENT_NAME}" -n "$NAMESPACE" >/dev/null 2>&1; then
              echo "::error::Deployment ${TARGET_DEPLOYMENT_NAME} not found in namespace ${NAMESPACE} for service ${TARGET_SERVICE_DIR}"
              exit 1
            fi
            container_names=$(kubectl get deployment "${TARGET_DEPLOYMENT_NAME}" -n "$NAMESPACE" -o jsonpath='{range .spec.template.spec.containers[*]}{.name}{"\n"}{end}')
            if ! grep -Fxq "${TARGET_CONTAINER_NAME}" <<< "$container_names"; then
              echo "::error::Container ${TARGET_CONTAINER_NAME} not found in deployment ${TARGET_DEPLOYMENT_NAME}"
              echo "Available containers:"
              echo "$container_names"
              exit 1
            fi

            # Update image tag
            kubectl set image deployment/${TARGET_DEPLOYMENT_NAME} \
              ${TARGET_CONTAINER_NAME}=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${TARGET_IMAGE_NAME}:$VERSION \
              -n $NAMESPACE

            # Wait for rollout
            kubectl rollout status deployment/${TARGET_DEPLOYMENT_NAME} \
              -n $NAMESPACE --timeout=300s
          done

      # ---------------------------------------------------------------------
      # Post-deploy smoke test (issue #355)
      # ---------------------------------------------------------------------
      # Pings /health on every microservice listed in config/ports.yaml. The
      # script honours core/health.py semantics: HTTP 200 healthy/degraded
      # means the service is acceptably up; HTTP 503 (or unreachable) means
      # it failed. degraded is treated as a warning, not a failure.
      #
      # On failure we capture the smoke report + service logs as workflow
      # artifacts and revert each deployment via `kubectl rollout undo`.
      # We attempt `helm rollback isa-user-migrations` so any failed
      # migration release is also reverted.
      # ---------------------------------------------------------------------
      - name: Port-forward to staging cluster
        run: |
          NAMESPACE=$(python core/deployment_targets.py --namespace staging)
          mkdir -p smoke-artifacts
          # Forward each microservice's ClusterIP to localhost on its
          # canonical port so smoke_test.sh can reach them with the
          # default SMOKE_BASE_URL=http://localhost.
          python3 scripts/_smoke_list_services.py > smoke-artifacts/services.tsv
          while IFS=$'\t' read -r short port; do
            [ -z "$short" ] && continue
            kubectl port-forward "svc/${short}" "${port}:${port}" \
              -n "$NAMESPACE" >"smoke-artifacts/pf-${short}.log" 2>&1 &
          done < smoke-artifacts/services.tsv
          # Give port-forwards a moment to establish.
          sleep 8

      - name: Post-deploy smoke test
        id: smoke
        env:
          SMOKE_BASE_URL: http://localhost
          SMOKE_GRACE_PERIOD_S: "120"
          SMOKE_RETRY_INTERVAL_S: "5"
          SMOKE_TIMEOUT_S: "5"
          SMOKE_OUTPUT_FILE: smoke-artifacts/smoke-report.tsv
        run: |
          chmod +x scripts/smoke_test.sh
          bash scripts/smoke_test.sh

      - name: Stop port-forwards
        if: always()
        run: |
          pkill -f "kubectl port-forward" || true

      - name: Capture smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-staging-${{ needs.prepare.outputs.version }}
          path: smoke-artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Rollback on smoke failure
        if: failure() && steps.smoke.conclusion == 'failure'
        run: |
          NAMESPACE=$(python core/deployment_targets.py --namespace staging)
          echo "::warning::Smoke test failed — rolling back deployments in ${NAMESPACE}"

          # Best-effort Helm rollback for the migration release. Harmless
          # if no rollback target exists (revision 0 reverts to previous).
          helm rollback isa-user-migrations 0 -n "$NAMESPACE" || true

          # Revert each service Deployment to its previous ReplicaSet.
          IFS=',' read -ra SERVICES <<< "${{ needs.prepare.outputs.services }}"
          resolve_target() {
            while IFS='=' read -r key value; do
              printf -v "$key" '%s' "$value"
            done < <(python core/deployment_targets.py "$1" --format env)
          }
          for service in "${SERVICES[@]}"; do
            resolve_target "$service"
            echo "Rolling back deployment/${TARGET_DEPLOYMENT_NAME}..."
            kubectl rollout undo "deployment/${TARGET_DEPLOYMENT_NAME}" \
              -n "$NAMESPACE" || true
            kubectl rollout status "deployment/${TARGET_DEPLOYMENT_NAME}" \
              -n "$NAMESPACE" --timeout=300s || true
          done
          # Re-fail the workflow so the failure is loud and final.
          exit 1

      - name: Deployment Summary
        run: |
          echo "# Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Services:** ${{ needs.prepare.outputs.services }}" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Deploy to Production
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'production'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      # ---------------------------------------------------------------------
      # Pre-deploy Alembic migration gate (issue #349)
      # ---------------------------------------------------------------------
      # See deploy-staging step for context. In production we use a
      # generous --timeout (20m) to accommodate larger datasets, but we
      # still keep `backoffLimit: 0` and `activeDeadlineSeconds: 600` on
      # the Job itself so a stuck migration cannot silently hang forever.
      # ---------------------------------------------------------------------
      - name: Pre-deploy schema migration gate
        run: |
          NAMESPACE=$(python core/deployment_targets.py --namespace production)
          VERSION="${{ needs.prepare.outputs.version }}"

          echo "Running Alembic migration Job before service rollout..."
          helm upgrade --install isa-user-migrations ./deployment/helm \
            -f ./deployment/helm/values-production.yaml \
            --set "migrationJob.image.registry=${{ env.REGISTRY }}" \
            --set "migrationJob.image.repository=${{ env.IMAGE_PREFIX }}/base" \
            --set "migrationJob.image.tag=${VERSION}" \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --wait \
            --timeout 20m

      - name: Capture migration Job logs
        if: always()
        run: |
          NAMESPACE=$(python core/deployment_targets.py --namespace production)
          echo "::group::Migration Job logs"
          JOB=$(kubectl get jobs -n "$NAMESPACE" \
            -l app.kubernetes.io/name=isa-user-migrations \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1:].metadata.name}' 2>/dev/null || true)
          if [ -n "$JOB" ]; then
            echo "Logs for job/$JOB:"
            kubectl logs -n "$NAMESPACE" "job/$JOB" --tail=500 || true
          else
            echo "No migration Job found in namespace $NAMESPACE."
          fi
          echo "::endgroup::"

      - name: Blue-Green Deployment
        run: |
          resolve_target() {
            while IFS='=' read -r key value; do
              printf -v "$key" '%s' "$value"
            done < <(python core/deployment_targets.py "$1" --format env)
          }

          NAMESPACE=$(python core/deployment_targets.py --namespace production)
          VERSION="${{ needs.prepare.outputs.version }}"

          IFS=',' read -ra SERVICES <<< "${{ needs.prepare.outputs.services }}"
          for service in "${SERVICES[@]}"; do
            resolve_target "$service"

            echo "Deploying ${TARGET_SERVICE_DIR} to production (blue-green) via ${TARGET_DEPLOYMENT_NAME}..."

            echo "Validate rollout target ${TARGET_DEPLOYMENT_NAME}/${TARGET_CONTAINER_NAME}..."
            if ! kubectl get deployment "${TARGET_DEPLOYMENT_NAME}" -n "$NAMESPACE" >/dev/null 2>&1; then
              echo "::error::Deployment ${TARGET_DEPLOYMENT_NAME} not found in namespace ${NAMESPACE} for service ${TARGET_SERVICE_DIR}"
              exit 1
            fi
            container_names=$(kubectl get deployment "${TARGET_DEPLOYMENT_NAME}" -n "$NAMESPACE" -o jsonpath='{range .spec.template.spec.containers[*]}{.name}{"\n"}{end}')
            if ! grep -Fxq "${TARGET_CONTAINER_NAME}" <<< "$container_names"; then
              echo "::error::Container ${TARGET_CONTAINER_NAME} not found in deployment ${TARGET_DEPLOYMENT_NAME}"
              echo "Available containers:"
              echo "$container_names"
              exit 1
            fi

            # Update image tag
            kubectl set image deployment/${TARGET_DEPLOYMENT_NAME} \
              ${TARGET_CONTAINER_NAME}=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${TARGET_IMAGE_NAME}:$VERSION \
              -n $NAMESPACE

            # Wait for rollout
            kubectl rollout status deployment/${TARGET_DEPLOYMENT_NAME} \
              -n $NAMESPACE --timeout=600s
          done

      # ---------------------------------------------------------------------
      # Post-deploy smoke test (issue #355) — production
      # ---------------------------------------------------------------------
      - name: Port-forward to production cluster
        run: |
          NAMESPACE=$(python core/deployment_targets.py --namespace production)
          mkdir -p smoke-artifacts
          python3 scripts/_smoke_list_services.py > smoke-artifacts/services.tsv
          while IFS=$'\t' read -r short port; do
            [ -z "$short" ] && continue
            kubectl port-forward "svc/${short}" "${port}:${port}" \
              -n "$NAMESPACE" >"smoke-artifacts/pf-${short}.log" 2>&1 &
          done < smoke-artifacts/services.tsv
          sleep 8

      - name: Post-deploy smoke test
        id: smoke
        env:
          SMOKE_BASE_URL: http://localhost
          SMOKE_GRACE_PERIOD_S: "180"
          SMOKE_RETRY_INTERVAL_S: "5"
          SMOKE_TIMEOUT_S: "5"
          SMOKE_OUTPUT_FILE: smoke-artifacts/smoke-report.tsv
        run: |
          chmod +x scripts/smoke_test.sh
          bash scripts/smoke_test.sh

      - name: Stop port-forwards
        if: always()
        run: |
          pkill -f "kubectl port-forward" || true

      - name: Capture smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-production-${{ needs.prepare.outputs.version }}
          path: smoke-artifacts/
          if-no-files-found: warn
          retention-days: 30

      - name: Rollback on smoke failure
        if: failure() && steps.smoke.conclusion == 'failure'
        run: |
          NAMESPACE=$(python core/deployment_targets.py --namespace production)
          echo "::error::Smoke test failed — rolling back production deployments in ${NAMESPACE}"

          helm rollback isa-user-migrations 0 -n "$NAMESPACE" || true

          IFS=',' read -ra SERVICES <<< "${{ needs.prepare.outputs.services }}"
          resolve_target() {
            while IFS='=' read -r key value; do
              printf -v "$key" '%s' "$value"
            done < <(python core/deployment_targets.py "$1" --format env)
          }
          for service in "${SERVICES[@]}"; do
            resolve_target "$service"
            echo "Rolling back deployment/${TARGET_DEPLOYMENT_NAME}..."
            kubectl rollout undo "deployment/${TARGET_DEPLOYMENT_NAME}" \
              -n "$NAMESPACE" || true
            kubectl rollout status "deployment/${TARGET_DEPLOYMENT_NAME}" \
              -n "$NAMESPACE" --timeout=600s || true
          done
          exit 1

      - name: Deployment Summary
        run: |
          echo "# Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Services:** ${{ needs.prepare.outputs.services }}" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Rollback (Manual Trigger)
  # ===========================================================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: failure() && (github.event_name == 'workflow_dispatch')
    needs: [deploy-staging, deploy-production]

    steps:
      - name: Rollback Deployment
        run: |
          echo "Initiating rollback..."
          # kubectl rollout undo deployment/xxx -n $NAMESPACE

      - name: Notify Rollback
        run: |
          echo "# Rollback Initiated" >> $GITHUB_STEP_SUMMARY
          echo "Deployment failed, rollback triggered." >> $GITHUB_STEP_SUMMARY
