# =============================================================================
# CI Pipeline - 5-Layer Test Pyramid
# =============================================================================
# Runs the complete test pyramid for all services.
#
# Test Layers:
#   1. Unit Tests - Pure functions, no infrastructure
#   2. Component Tests - Service logic with mocked dependencies
#   3. Integration Tests - Real HTTP + Database
#   4. API Tests - Full authentication flow
#   5. Smoke Tests - E2E validation
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop, 'release/*']
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  # ---------------------------------------------------------------------------
  # On-demand trigger for the heavyweight K8s integration job (#354).
  # The path-filtered ``k8s-integration`` job only runs automatically when
  # the scale path is touched; reviewers can opt in for any branch via:
  #   gh workflow run CI -r <branch> -f run_k8s_tests=true
  # ---------------------------------------------------------------------------
  workflow_dispatch:
    inputs:
      run_k8s_tests:
        description: 'Run the kind-based HPA scale-up integration job (#354)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  PYTHON_VERSION: '3.11'
  UV_VERSION: '0.4.0'

jobs:
  # ===========================================================================
  # Layer 1 & 2: Unit + Component Tests (No Infrastructure)
  # ===========================================================================
  unit-component:
    name: Unit & Component Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -r deployment/requirements/dev.txt

      - name: Run Unit Tests
        run: |
          source .venv/bin/activate
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TEST_FILES=$(git diff --name-only --diff-filter=ACMR HEAD^1...HEAD \
              | grep -E '^tests/unit/.*\.py$' || true)
            if [[ -z "$TEST_FILES" ]]; then
              echo "No unit tests changed; skipping unit test job."
              exit 0
            fi
            pytest $TEST_FILES -v --tb=short \
              --junitxml=reports/unit-results.xml \
              --cov=microservices \
              --cov-report=xml:reports/unit-coverage.xml
          else
            pytest tests/unit -v --tb=short \
              --junitxml=reports/unit-results.xml \
              --cov=microservices \
              --cov-report=xml:reports/unit-coverage.xml
          fi

      - name: Run Component Tests
        run: |
          source .venv/bin/activate
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TEST_FILES=$(git diff --name-only --diff-filter=ACMR HEAD^1...HEAD \
              | grep -E '^tests/component/.*\.py$' || true)
            if [[ -z "$TEST_FILES" ]]; then
              echo "No component tests changed; skipping component test job."
              exit 0
            fi
            pytest $TEST_FILES -v --tb=short \
              --junitxml=reports/component-results.xml \
              --cov=microservices \
              --cov-report=xml:reports/component-coverage.xml
          else
            pytest tests/component -v --tb=short \
              --junitxml=reports/component-results.xml \
              --cov=microservices \
              --cov-report=xml:reports/component-coverage.xml
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-component-results
          path: reports/

  # ===========================================================================
  # Layer 3: Integration Tests (Requires Database)
  # ===========================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-component
    if: github.event_name == 'push'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      nats:
        image: nats:latest
        ports:
          - 4222:4222

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -r deployment/requirements/dev.txt

      - name: Run Integration Tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
          NATS_URL: nats://localhost:4222
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          source .venv/bin/activate
          pytest tests/integration -v --tb=short \
            --junitxml=reports/integration-results.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: reports/

  # ===========================================================================
  # Code Quality Checks
  # ===========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install ruff mypy 'black<24'

      - name: Check formatting with Black
        run: |
          source .venv/bin/activate
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PY_FILES=$(git diff --name-only --diff-filter=ACMR HEAD^1...HEAD \
              | grep -E '^(microservices|tests)/.*\.py$' \
              | grep -Ev '/migrations/' || true)
          else
            PY_FILES=$(find microservices tests -type f -name '*.py' -not -path '*/migrations/*')
          fi

          if [[ -z "$PY_FILES" ]]; then
            echo "No Python files changed; skipping Black."
            exit 0
          fi

          black --check $PY_FILES

      - name: Lint with Ruff (baseline gate)
        # Issue #214 established a Ruff-clean baseline for core/ and
        # microservices/. This step enforces that baseline on every push --
        # any new finding fails CI. Configuration lives in pyproject.toml.
        # See docs/guidance/ruff_baseline.md for what is and isn't enforced.
        run: |
          source .venv/bin/activate
          ruff check core/ microservices/

      - name: Type check with mypy
        run: |
          source .venv/bin/activate
          mypy microservices/ --ignore-missing-imports --no-error-summary || true

  # ===========================================================================
  # Contract Validation
  # ===========================================================================
  contracts:
    name: Validate Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install pydantic

      - name: Validate Data Contracts
        run: |
          source .venv/bin/activate
          python -m py_compile tests/contracts/*/data_contract.py || true

      - name: Check Contract Coverage
        run: |
          echo "Checking CDD Layer Coverage..."
          for service in microservices/*_service; do
            name=$(basename $service | sed 's/_service//')
            echo "Service: $name"
            [ -f "docs/domain/${name}_service.md" ] && echo "  L1: OK" || echo "  L1: MISSING"
            [ -f "docs/prd/${name}_service.md" ] && echo "  L2: OK" || echo "  L2: MISSING"
            [ -f "docs/design/${name}_service.md" ] && echo "  L3: OK" || echo "  L3: MISSING"
            [ -f "tests/contracts/${name}_service/data_contract.py" ] && echo "  L4: OK" || echo "  L4: MISSING"
            [ -f "tests/contracts/${name}_service/logic_contract.md" ] && echo "  L5: OK" || echo "  L5: MISSING"
            [ -f "tests/contracts/${name}_service/system_contract.md" ] && echo "  L6: OK" || echo "  L6: MISSING"
          done

  # ===========================================================================
  # Build Docker Images
  # ===========================================================================
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [unit-component, lint]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Base Image
        run: |
          docker build -f deployment/k8s/Dockerfile.base -t isa-base:latest .

      - name: Build Service Images
        run: |
          for service in microservices/*_service; do
            name=$(basename $service)
            echo "Building $name..."
            # docker build -f deployment/k8s/Dockerfile.$name -t $name:${{ github.sha }} .
          done

  # ===========================================================================
  # K8s Integration Test — HPA scale-up (#354, epic #345)
  # ===========================================================================
  # Stands up a kind cluster, deploys the auth-stub workload from
  # ``tests/integration/k8s/manifests/``, drives synthetic load to trigger
  # HPA scale-up, and asserts:
  #   1. All replicas pass /health
  #   2. No 5xx / dropped requests during the scale event
  #   3. Total Postgres pool size stays within the cross-service budget
  #      using ``core.postgres_client.compute_pool_size``
  #   4. Manual scale-down drains gracefully via core/graceful_shutdown.py
  #
  # Trigger gating (any one is sufficient):
  #   * ``workflow_dispatch`` with run_k8s_tests=true
  #   * Push/PR that touches the scale path: core/postgres_client.py,
  #     core/graceful_shutdown.py, deployment/helm/, or the test files
  #     themselves. ``dorny/paths-filter`` computes this on the fly.
  # ---------------------------------------------------------------------------
  k8s-paths-filter:
    name: K8s Paths Filter
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.scale_path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes on the scale path
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            scale_path:
              - 'core/postgres_client.py'
              - 'core/graceful_shutdown.py'
              - 'deployment/helm/**'
              - 'tests/integration/k8s/**'
              - '.github/workflows/ci.yml'

  k8s-integration:
    name: K8s Integration Test
    runs-on: ubuntu-latest
    needs: [unit-component, k8s-paths-filter]
    # Run when the scale path changed OR a maintainer explicitly opted in
    # via workflow_dispatch. We deliberately skip on PRs that don't touch
    # the path because the kind cluster boot takes 60-90s.
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.run_k8s_tests == 'true') ||
      (needs.k8s-paths-filter.outputs.should_run == 'true')
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv

      - name: Install Python dependencies
        run: |
          source .venv/bin/activate
          # Test driver only needs httpx + pyyaml + pytest. Pull the full
          # dev set so the in-test ``from core.postgres_client`` import
          # works without surprises.
          uv pip install -r deployment/requirements/dev.txt

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: isa-scale-up
          # Pin to a stable K8s minor that matches the chart's apiVersion
          # commitments (autoscaling/v2 has been stable since 1.23).
          node_image: kindest/node:v1.29.2
          wait: 120s

      - name: Install metrics-server (HPA needs it)
        run: |
          # The HPA reads CPU utilization via metrics-server. kind ships
          # without it; install upstream and patch --kubelet-insecure-tls
          # because kind nodes use self-signed kubelet certs.
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl patch -n kube-system deployment metrics-server --type=json \
            -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
          kubectl rollout status -n kube-system deployment/metrics-server --timeout=180s

      - name: Run scale-up integration test
        env:
          RUN_K8S_TESTS: '1'
        run: |
          source .venv/bin/activate
          pytest tests/integration/k8s/test_scale_up.py -v --tb=short \
            -m k8s \
            --junitxml=reports/k8s-results.xml

      - name: Capture cluster state on failure
        if: failure()
        run: |
          mkdir -p reports/k8s-debug
          kubectl get all -A -o wide > reports/k8s-debug/all.txt 2>&1 || true
          kubectl describe hpa -n scale-up-test auth-stub > reports/k8s-debug/hpa.txt 2>&1 || true
          kubectl describe deployment -n scale-up-test auth-stub > reports/k8s-debug/deploy.txt 2>&1 || true
          kubectl logs -n scale-up-test -l app=auth-stub --tail=200 > reports/k8s-debug/pod-logs.txt 2>&1 || true
          kubectl top pods -A > reports/k8s-debug/top.txt 2>&1 || true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k8s-integration-results
          path: reports/

  # ===========================================================================
  # Summary Report
  # ===========================================================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-component, integration, contracts]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Generate Summary
        run: |
          echo "# Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Layer | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-component.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Component Tests | ${{ needs.unit-component.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Validation | ${{ needs.contracts.result }} |" >> $GITHUB_STEP_SUMMARY
