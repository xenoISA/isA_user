# Auto-generated from config/ports.yaml
# Service: telemetry_service
# Regenerate with: python -m agents.tools.generate_config --deployment telemetry_service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry
  namespace: isa-cloud-staging
  labels:
    app: telemetry
    tier: applications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry
  template:
    metadata:
      labels:
        app: telemetry
    spec:
      containers:
      - name: telemetry
        image: isa-user-base:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8225
          name: http
        envFrom:
        - configMapRef:
            name: user-config
        env:
        - name: SERVICE_NAME
          value: "telemetry_service"
        - name: SERVICE_PORT
          value: "8225"
        command: ["python", "-m", "uvicorn"]
        args: ["microservices.telemetry_service.main:app", "--host", "0.0.0.0", "--port", "8225"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8225
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8225
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry
  namespace: isa-cloud-staging
  labels:
    app: telemetry
  annotations:
    # Sticky-session strategy is implemented at the Service layer using
    # ClientIP affinity. This keeps long-lived `/ws/telemetry/{id}` streams
    # pinned to the same replica during the connection lifetime, complementing
    # the cookie/header (`X-Telemetry-Session`) emitted by the application.
    # If an ingress controller (NGINX, APISIX, Traefik) fronts this service,
    # prefer its cookie-affinity setting and remove this Service-level config
    # to avoid double-stickiness — see microservices/telemetry_service/main.py.
    isa.platform/affinity-strategy: "service-clientip"
spec:
  type: ClusterIP
  # Pin a client to a replica for the connection lifetime + 3h idle window.
  # 10800s matches the longest realistic subscription_ttl (24h cap) divided
  # by the average reconnect cadence; tune if HPA scale events show drift.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
  - port: 8225
    targetPort: 8225
    protocol: TCP
    name: http
  selector:
    app: telemetry
