# =============================================================================
# ISA User Platform - PRODUCTION Helm Values
# =============================================================================
# Deploy all services:
#   ./deployment/helm/deploy.sh production
#
# Deploy individual service:
#   helm upgrade --install user-auth-service \
#     ~/Documents/Fun/isA/isA_Cloud/deployments/charts/isa-service \
#     -f deployment/helm/values-production.yaml \
#     --set name=user-auth-service \
#     --set image.repository=isa/user-auth \
#     --set port=8201 \
#     -n isa-cloud-production
# =============================================================================

namespace: isa-cloud-production

image:
  registry: harbor.isa.io
  tag: "0.0.0"
  pullPolicy: IfNotPresent

replicas: 2

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

rollout:
  enabled: true

# ---------------------------------------------------------------------------
# Database pool sizing (epic #345 / story #346)
# ---------------------------------------------------------------------------
# Defaults for the replica-aware Postgres pool sizing formula in
# core/postgres_client.py:
#
#     max_pool_size = max(5, poolBase + (POD_REPLICA_COUNT - 1) * poolGrowth)
#
# These values feed the corresponding env vars (DB_POOL_BASE, DB_POOL_GROWTH,
# POD_REPLICA_COUNT) below — keep them in sync if you adjust either side.
# Note: POD_REPLICA_COUNT is static per-deploy (K8s Downward API can't
# expose live HPA replica count to pods). Re-roll the deployment to pick
# up an updated count.
database:
  # Conservative defaults for cross-service connection budget; see
  # core/postgres_client.py module docstring and the tracking issue
  # referenced in PR #358 for the capacity-bump plan.
  poolBase: 2
  poolGrowth: 1

health:
  path: /health
  initialDelaySeconds: 60
  periodSeconds: 10

service:
  type: ClusterIP

consul:
  enabled: true

# =============================================================================
# Pre-deploy Migration Job (issue #349, epic #345)
# =============================================================================
# Pinned production image — keep `tag` aligned with the release being shipped
# so alembic scripts in the migration container match the schema the new
# service pods will read/write. The CI workflow overrides this via
# `--set migrationJob.image.tag=$VERSION`.
# =============================================================================
migrationJob:
  enabled: true
  image:
    registry: harbor.isa.io
    repository: isa/user-base
    tag: "0.0.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  backoffLimit: 0
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 86400
  serviceAccountName: ""
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  extraEnv:
    - name: LOG_LEVEL
      value: "INFO"
    - name: ENV
      value: "production"

# =============================================================================
# Shared Environment Variables (injected into all services)
# =============================================================================
env:
  # --- System ---
  - name: ENV
    value: "production"
  - name: PYTHONPATH
    value: "/app"
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: DEBUG
    value: "false"

  # --- Logging ---
  - name: LOG_LEVEL
    value: "INFO"
  - name: LOKI_ENABLED
    value: "true"
  - name: ENABLE_STRUCTURED_LOGGING
    value: "true"

  # --- Consul ---
  - name: CONSUL_HOST
    value: "consul-server.isa-cloud-production.svc.cluster.local"
  - name: CONSUL_PORT
    value: "8500"
  - name: CONSUL_ENABLED
    value: "true"

  # --- PostgreSQL via PgBouncer transaction pool (xenoISA/isA_user#383) ---
  # Services connect through PgBouncer (port 6432) instead of Postgres direct
  # (port 5432) so per-pod application pools can grow with HPA without
  # exceeding the Postgres backend max_connections ceiling. PgBouncer chart:
  # xenoISA/isA_Cloud#231 (PR #233) — Service `pgbouncer.isa-cloud-production`.
  # PgBouncer's [databases] section maps `isa_platform` straight through to
  # the postgresql-ha-pgpool backend; no DB-name change.
  - name: POSTGRES_HOST
    value: "pgbouncer.isa-cloud-production.svc.cluster.local"
  - name: POSTGRES_PORT
    value: "6432"
  - name: POSTGRES_DB
    value: "isa_platform"
  - name: POSTGRES_USER
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: postgres-user
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: postgres-password

  # --- DB pool sizing (epic #345 / story #346) ---
  # core/postgres_client.py reads these to scale each pod's Postgres pool
  # with replica count: max_pool_size = max(5, base + (replicas-1) * growth).
  #
  # POD_REPLICA_COUNT mirrors `replicas` above. K8s Downward API does not
  # expose Deployment.spec.replicas at pod-level, so we inject the desired
  # count statically. This reflects desired replicas at deploy time, not
  # the live HPA count — a reasonable proxy (see story #346 acceptance).
  # Pods picked up by HPA scale-out keep the deploy-time value until the
  # next rollout.
  - name: POD_REPLICA_COUNT
    value: "2"
  - name: DB_POOL_BASE
    value: "2"
  - name: DB_POOL_GROWTH
    value: "1"

  # --- Redis (native - 6379) ---
  - name: REDIS_HOST
    value: "redis-master.isa-cloud-production.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_DB
    value: "0"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: redis-password

  # --- Qdrant (native HTTP - 6333) ---
  - name: QDRANT_HOST
    value: "qdrant.isa-cloud-production.svc.cluster.local"
  - name: QDRANT_PORT
    value: "6333"

  # --- Neo4j (native bolt - 7687) ---
  - name: NEO4J_HOST
    value: "neo4j.isa-cloud-production.svc.cluster.local"
  - name: NEO4J_PORT
    value: "7687"
  - name: NEO4J_USER
    value: "neo4j"
  - name: NEO4J_PASSWORD
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: neo4j-password

  # --- NATS (native - 4222) ---
  - name: NATS_HOST
    value: "nats.isa-cloud-production.svc.cluster.local"
  - name: NATS_PORT
    value: "4222"
  - name: NATS_URL
    value: "nats://nats.isa-cloud-production.svc.cluster.local:4222"

  # --- MinIO (S3 - 9000) ---
  - name: MINIO_HOST
    value: "minio.isa-cloud-production.svc.cluster.local"
  - name: MINIO_PORT
    value: "9000"
  - name: MINIO_SECURE
    value: "true"
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: minio-access-key
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: minio-secret-key

  # --- MQTT (EMQX - 1883) ---
  - name: MQTT_HOST
    value: "emqx.isa-cloud-production.svc.cluster.local"
  - name: MQTT_PORT
    value: "1883"

