# =============================================================================
# ISA User Platform - PRODUCTION Helm Values
# =============================================================================
# Deploy all services:
#   ./deployment/helm/deploy.sh production
#
# Deploy individual service:
#   helm upgrade --install user-auth-service \
#     ~/Documents/Fun/isA/isA_Cloud/deployments/charts/isa-service \
#     -f deployment/helm/values-production.yaml \
#     --set name=user-auth-service \
#     --set image.repository=isa/user-auth \
#     --set port=8201 \
#     -n isa-cloud-prod
# =============================================================================

namespace: isa-cloud-prod

image:
  registry: harbor.isa.io
  tag: "0.0.0"
  pullPolicy: IfNotPresent

replicas: 2

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

# =============================================================================
# HorizontalPodAutoscaler — KEDA ScaledObjects (issue #352, epic #345)
# =============================================================================
# PRODUCTION rolls out KEDA-driven custom metrics. Prerequisite: the cluster
# operator must install the KEDA controller before this Helm release is
# upgraded with `hpa.enabled=true`:
#
#   helm repo add kedacore https://kedacore.github.io/charts
#   helm install keda kedacore/keda -n keda --create-namespace
#
# See docs/runbooks/hpa-metrics.md and
# docs/adr/0001-hpa-custom-metrics-tooling.md for tier rationale and
# threshold-tuning playbook.
# =============================================================================
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  pollingInterval: 30
  cooldownPeriod: 300
  scaleDownStabilization: 300
  fallbackCPUUtilization: 70
  fallbackMemoryUtilization: 80
  tiers:
    default:
      triggers: []
    event:
      # NATS JetStream backlog — primary signal for wallet/billing/payment.
      # `lagThreshold` is the per-replica pending-message ceiling: KEDA scales
      # up once the consumer's backlog exceeds N * lagThreshold. Tune per
      # service in the per-service `hpa.triggers` override below.
      triggers:
        - type: nats-jetstream
          metricType: AverageValue
          metadata:
            natsServerMonitoringEndpoint: "nats.isa-cloud-prod.svc.cluster.local:8222"
            account: "$G"
            stream: "isa-events"
            consumer: "isa-user-consumer"
            lagThreshold: "100"
            useHttps: "false"
    auth:
      # p95 request latency from the shared isA_Common HTTP histogram. Scales
      # up when p95 >= threshold seconds; auth/account/authorization tail-spike
      # long before CPU saturates because the bottleneck is downstream
      # Postgres/Redis fan-out. The `__SVC__` placeholder is interpolated by
      # the per-service override below — leaving it unsubstituted at the tier
      # level matches every service and is intentional as a safe default.
      triggers:
        - type: prometheus
          metricType: AverageValue
          metadata:
            serverAddress: "http://prometheus.isa-cloud-prod.svc.cluster.local:9090"
            metricName: "isa_user_request_latency_p95_seconds"
            threshold: "0.5"
            query: |
              histogram_quantile(0.95,
                sum(rate(isa_user_http_request_duration_seconds_bucket[2m])) by (le))
    telemetry:
      # WebSocket connection count from the telemetry exporter. Scales up at
      # ~500 active sockets per replica to keep fan-out broadcast cheap.
      triggers:
        - type: prometheus
          metricType: AverageValue
          metadata:
            serverAddress: "http://prometheus.isa-cloud-prod.svc.cluster.local:9090"
            metricName: "isa_user_websocket_active_connections"
            threshold: "500"
            query: |
              sum(isa_user_websocket_active_connections)

health:
  path: /health
  initialDelaySeconds: 60
  periodSeconds: 10

service:
  type: ClusterIP

consul:
  enabled: true

# =============================================================================
# Pre-deploy Migration Job (issue #349, epic #345)
# =============================================================================
# Pinned production image — keep `tag` aligned with the release being shipped
# so alembic scripts in the migration container match the schema the new
# service pods will read/write. The CI workflow overrides this via
# `--set migrationJob.image.tag=$VERSION`.
# =============================================================================
migrationJob:
  enabled: true
  image:
    registry: harbor.isa.io
    repository: isa/user-base
    tag: "0.0.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  backoffLimit: 0
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 86400
  serviceAccountName: ""
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  extraEnv:
    - name: LOG_LEVEL
      value: "INFO"
    - name: ENV
      value: "production"

# =============================================================================
# Shared Environment Variables (injected into all services)
# =============================================================================
env:
  # --- System ---
  - name: ENV
    value: "production"
  - name: PYTHONPATH
    value: "/app"
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: DEBUG
    value: "false"

  # --- Logging ---
  - name: LOG_LEVEL
    value: "INFO"
  - name: LOKI_ENABLED
    value: "true"
  - name: ENABLE_STRUCTURED_LOGGING
    value: "true"

  # --- Consul ---
  - name: CONSUL_HOST
    value: "consul-server.isa-cloud-prod.svc.cluster.local"
  - name: CONSUL_PORT
    value: "8500"
  - name: CONSUL_ENABLED
    value: "true"

  # --- PostgreSQL (native asyncpg - 5432) ---
  - name: POSTGRES_HOST
    value: "postgresql.isa-cloud-prod.svc.cluster.local"
  - name: POSTGRES_PORT
    value: "5432"
  - name: POSTGRES_DB
    value: "isa_platform"
  - name: POSTGRES_USER
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: postgres-user
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: postgres-password

  # --- Redis (native - 6379) ---
  - name: REDIS_HOST
    value: "redis-master.isa-cloud-prod.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_DB
    value: "0"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: redis-password

  # --- Qdrant (native HTTP - 6333) ---
  - name: QDRANT_HOST
    value: "qdrant.isa-cloud-prod.svc.cluster.local"
  - name: QDRANT_PORT
    value: "6333"

  # --- Neo4j (native bolt - 7687) ---
  - name: NEO4J_HOST
    value: "neo4j.isa-cloud-prod.svc.cluster.local"
  - name: NEO4J_PORT
    value: "7687"
  - name: NEO4J_USER
    value: "neo4j"
  - name: NEO4J_PASSWORD
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: neo4j-password

  # --- NATS (native - 4222) ---
  - name: NATS_HOST
    value: "nats.isa-cloud-prod.svc.cluster.local"
  - name: NATS_PORT
    value: "4222"
  - name: NATS_URL
    value: "nats://nats.isa-cloud-prod.svc.cluster.local:4222"

  # --- MinIO (S3 - 9000) ---
  - name: MINIO_HOST
    value: "minio.isa-cloud-prod.svc.cluster.local"
  - name: MINIO_PORT
    value: "9000"
  - name: MINIO_SECURE
    value: "true"
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: minio-access-key
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: minio-secret-key

  # --- MQTT (EMQX - 1883) ---
  - name: MQTT_HOST
    value: "emqx.isa-cloud-prod.svc.cluster.local"
  - name: MQTT_PORT
    value: "1883"

# =============================================================================
# Microservices Configuration
# =============================================================================
services:
  auth:
    name: user-auth-service
    repository: isa/user-auth
    port: 8201
    hpa:
      tier: auth
      # Per-service threshold override: auth has the tightest SLA — page on
      # p95 > 300ms, scale up at 250ms.
      triggers:
        - type: prometheus
          metricType: AverageValue
          metadata:
            serverAddress: "http://prometheus.isa-cloud-prod.svc.cluster.local:9090"
            metricName: "isa_user_auth_request_latency_p95_seconds"
            threshold: "0.25"
            query: |
              histogram_quantile(0.95,
                sum(rate(isa_user_http_request_duration_seconds_bucket{service="user-auth-service"}[2m])) by (le))
  account:
    name: user-account-service
    repository: isa/user-account
    port: 8202
    hpa:
      tier: auth
      triggers:
        - type: prometheus
          metricType: AverageValue
          metadata:
            serverAddress: "http://prometheus.isa-cloud-prod.svc.cluster.local:9090"
            metricName: "isa_user_account_request_latency_p95_seconds"
            threshold: "0.4"
            query: |
              histogram_quantile(0.95,
                sum(rate(isa_user_http_request_duration_seconds_bucket{service="user-account-service"}[2m])) by (le))
  session:
    name: user-session-service
    repository: isa/user-session
    port: 8203
  authorization:
    name: user-authorization-service
    repository: isa/user-authorization
    port: 8204
    hpa:
      tier: auth
      triggers:
        - type: prometheus
          metricType: AverageValue
          metadata:
            serverAddress: "http://prometheus.isa-cloud-prod.svc.cluster.local:9090"
            metricName: "isa_user_authorization_request_latency_p95_seconds"
            threshold: "0.25"
            query: |
              histogram_quantile(0.95,
                sum(rate(isa_user_http_request_duration_seconds_bucket{service="user-authorization-service"}[2m])) by (le))
  audit:
    name: user-audit-service
    repository: isa/user-audit
    port: 8205
  notification:
    name: user-notification-service
    repository: isa/user-notification
    port: 8206
  payment:
    name: user-payment-service
    repository: isa/user-payment
    port: 8207
    hpa:
      tier: event
      maxReplicas: 15
      triggers:
        - type: nats-jetstream
          metricType: AverageValue
          metadata:
            natsServerMonitoringEndpoint: "nats.isa-cloud-prod.svc.cluster.local:8222"
            account: "$G"
            stream: "isa-events"
            consumer: "user-payment-service"
            lagThreshold: "50"
            useHttps: "false"
  wallet:
    name: user-wallet-service
    repository: isa/user-wallet
    port: 8208
    hpa:
      tier: event
      maxReplicas: 15
      triggers:
        - type: nats-jetstream
          metricType: AverageValue
          metadata:
            natsServerMonitoringEndpoint: "nats.isa-cloud-prod.svc.cluster.local:8222"
            account: "$G"
            stream: "isa-events"
            consumer: "user-wallet-service"
            lagThreshold: "100"
            useHttps: "false"
  storage:
    name: user-storage-service
    repository: isa/user-storage
    port: 8209
  order:
    name: user-order-service
    repository: isa/user-order
    port: 8210
  task:
    name: user-task-service
    repository: isa/user-task
    port: 8211
  organization:
    name: user-organization-service
    repository: isa/user-organization
    port: 8212
  invitation:
    name: user-invitation-service
    repository: isa/user-invitation
    port: 8213
  vault:
    name: user-vault-service
    repository: isa/user-vault
    port: 8214
  product:
    name: user-product-service
    repository: isa/user-product
    port: 8215
  billing:
    name: user-billing-service
    repository: isa/user-billing
    port: 8216
    hpa:
      tier: event
      triggers:
        - type: nats-jetstream
          metricType: AverageValue
          metadata:
            natsServerMonitoringEndpoint: "nats.isa-cloud-prod.svc.cluster.local:8222"
            account: "$G"
            stream: "isa-events"
            consumer: "user-billing-service"
            lagThreshold: "100"
            useHttps: "false"
  calendar:
    name: user-calendar-service
    repository: isa/user-calendar
    port: 8217
  weather:
    name: user-weather-service
    repository: isa/user-weather
    port: 8218
  album:
    name: user-album-service
    repository: isa/user-album
    port: 8219
  device:
    name: user-device-service
    repository: isa/user-device
    port: 8220
  ota:
    name: user-ota-service
    repository: isa/user-ota
    port: 8221
  media:
    name: user-media-service
    repository: isa/user-media
    port: 8222
  memory:
    name: user-memory-service
    repository: isa/user-memory
    port: 8223
  location:
    name: user-location-service
    repository: isa/user-location
    port: 8224
  telemetry:
    name: user-telemetry-service
    repository: isa/user-telemetry
    port: 8225
    hpa:
      tier: telemetry
      # NOTE: requires `isa_user_websocket_active_connections` Prometheus
      # gauge exported from telemetry_service. If the exporter is missing
      # at deploy time the trigger will fall through to the CPU/memory
      # fallback ceilings — file a follow-up issue rather than scaling on
      # CPU alone (#352 explicitly calls this out).
      triggers:
        - type: prometheus
          metricType: AverageValue
          metadata:
            serverAddress: "http://prometheus.isa-cloud-prod.svc.cluster.local:9090"
            metricName: "isa_user_telemetry_active_connections"
            threshold: "500"
            query: |
              sum(isa_user_websocket_active_connections{service="user-telemetry-service"})
  compliance:
    name: user-compliance-service
    repository: isa/user-compliance
    port: 8226
  document:
    name: user-document-service
    repository: isa/user-document
    port: 8227
  subscription:
    name: user-subscription-service
    repository: isa/user-subscription
    port: 8228
  credit:
    name: user-credit-service
    repository: isa/user-credit
    port: 8229
  event:
    name: user-event-service
    repository: isa/user-event
    port: 8230
  membership:
    name: user-membership-service
    repository: isa/user-membership
    port: 8250
  campaign:
    name: user-campaign-service
    repository: isa/user-campaign
    port: 8251
  inventory:
    name: user-inventory-service
    repository: isa/user-inventory
    port: 8252
  tax:
    name: user-tax-service
    repository: isa/user-tax
    port: 8253
  fulfillment:
    name: user-fulfillment-service
    repository: isa/user-fulfillment
    port: 8254
