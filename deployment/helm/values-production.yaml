# =============================================================================
# Per-service overrides for the new microservices (#462)
# =============================================================================
# Production-pinned settings — bump image.tag in CI via
# `--set artifactService.image.tag=$VERSION`. Real secrets (e.g., an
# ISA_MODEL provider API key, if added later) MUST come from `user-secrets`
# via valueFrom.secretKeyRef, not be inlined here.
# =============================================================================
artifactService:
  enabled: true
  image:
    repository: isa/user-artifact
    tag: "0.0.0"
  env:
    - name: ISA_MODEL_URL
      value: "http://isa-model.isa-cloud-production.svc.cluster.local:8082"
    - name: ISA_MCP_URL
      value: "http://isa-mcp.isa-cloud-production.svc.cluster.local:8081/mcp"
    - name: ARTIFACT_DAILY_QUOTA
      value: "100"
    - name: ARTIFACT_RUNTIME_MODEL
      value: "gpt-4.1-nano"
    - name: ARTIFACT_RUNTIME_PROVIDER
      value: "openai"
    # Per-minute caps from microservices/artifact_service/main.py (PR #475).
    # Production keeps the in-code defaults until traffic data justifies a
    # change — bump via `--set artifactService.env[…]` if needed.
    - name: ARTIFACT_RUNTIME_RATE_PER_MINUTE
      value: "100"
    - name: ARTIFACT_MCP_RATE_PER_MINUTE
      value: "60"

projectSharingService:
  enabled: true
  image:
    repository: isa/user-project-sharing
    tag: "0.0.0"
  env:
    - name: PROJECT_SHARE_ACCEPT_BASE_URL
      value: "https://app.isa.dev/shares/accept"

connectorService:
  enabled: true
  image:
    repository: isa/user-connector
    tag: "0.0.0"
  # connector_service (xenoISA/isA_#464). Defaults are conservative for
  # production: feature flag is ON but private-IP bypass + dev_auth are
  # OFF; dev_vault remains true until the real vault_service wiring lands
  # (see PR body "What's still open"). Ops can flip
  # ALLOW_CUSTOM_MCP_CONNECTORS=false to disable the BYO MCP slice without
  # taking down /catalog or /installed.
  env:
    - name: ALLOW_CUSTOM_MCP_CONNECTORS
      value: "true"
    - name: ALLOW_PRIVATE_MCP_HOSTS
      value: "false"
    - name: CONNECTOR_USE_DEV_VAULT
      value: "true"
    - name: CONNECTOR_DEV_AUTH
      value: "false"
