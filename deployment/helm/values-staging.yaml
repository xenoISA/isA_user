# =============================================================================
# ISA User Platform - STAGING Helm Values
# =============================================================================
# Deploy all services:
#   ./deployment/helm/deploy.sh staging
#
# Deploy individual service:
#   helm upgrade --install user-auth-service \
#     ~/Documents/Fun/isA/isA_Cloud/deployments/charts/isa-service \
#     -f deployment/helm/values-staging.yaml \
#     --set name=user-auth-service \
#     --set image.repository=isa/user-auth \
#     --set port=8201 \
#     -n isa-cloud-staging
# =============================================================================

namespace: isa-cloud-staging

image:
  registry: harbor.local:30443
  tag: latest
  pullPolicy: Always

replicas: 1

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: false

rollout:
  enabled: false

# ---------------------------------------------------------------------------
# Database pool sizing (epic #345 / story #346)
# ---------------------------------------------------------------------------
# See values-production.yaml for the full formula. Staging keeps modest
# defaults to mirror prod behaviour during scale-out testing.
database:
  # Conservative defaults to mirror prod cross-service connection budget;
  # see core/postgres_client.py module docstring.
  poolBase: 2
  poolGrowth: 1

health:
  path: /health
  initialDelaySeconds: 60
  periodSeconds: 10

service:
  type: ClusterIP

consul:
  enabled: true

# =============================================================================
# Pre-deploy Migration Job (issue #349, epic #345)
# =============================================================================
migrationJob:
  enabled: true
  image:
    registry: harbor.local:30443
    repository: isa/user-base
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  backoffLimit: 0
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 86400
  serviceAccountName: ""
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  extraEnv:
    - name: LOG_LEVEL
      value: "DEBUG"
    - name: ENV
      value: "staging"

# =============================================================================
# Shared Environment Variables (injected into all services)
# =============================================================================
env:
  # --- System ---
  - name: ENV
    value: "staging"
  - name: PYTHONPATH
    value: "/app"
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: DEBUG
    value: "false"

  # --- Logging ---
  - name: LOG_LEVEL
    value: "INFO"
  - name: LOKI_ENABLED
    value: "false"

  # --- Consul ---
  - name: CONSUL_HOST
    value: "consul.isa-cloud-staging.svc.cluster.local"
  - name: CONSUL_PORT
    value: "8500"
  - name: CONSUL_ENABLED
    value: "true"

  # --- PostgreSQL via PgBouncer transaction pool (xenoISA/isA_user#383) ---
  # Services connect through PgBouncer (port 6432) instead of Postgres direct
  # (port 5432) so per-pod application pools can grow with HPA without
  # exceeding the Postgres backend max_connections ceiling. PgBouncer chart:
  # xenoISA/isA_Cloud#231 (PR #233) — Service `pgbouncer.isa-cloud-staging`.
  - name: POSTGRES_HOST
    value: "pgbouncer.isa-cloud-staging.svc.cluster.local"
  - name: POSTGRES_PORT
    value: "6432"
  - name: POSTGRES_DB
    value: "isa_platform"
  - name: POSTGRES_USER
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: postgres-user
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: postgres-password

  # --- DB pool sizing (epic #345 / story #346) ---
  # core/postgres_client.py reads these to scale per-pod Postgres pool size.
  # Staging defaults to 1 replica → pool floor of 5 connections.
  - name: POD_REPLICA_COUNT
    value: "1"
  - name: DB_POOL_BASE
    value: "2"
  - name: DB_POOL_GROWTH
    value: "1"

  # --- Redis (native - 6379) ---
  - name: REDIS_HOST
    value: "redis.isa-cloud-staging.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_DB
    value: "0"

  # --- Qdrant (native HTTP - 6333) ---
  - name: QDRANT_HOST
    value: "qdrant.isa-cloud-staging.svc.cluster.local"
  - name: QDRANT_PORT
    value: "6333"

  # --- Neo4j (native bolt - 7687) ---
  - name: NEO4J_HOST
    value: "neo4j.isa-cloud-staging.svc.cluster.local"
  - name: NEO4J_PORT
    value: "7687"
  - name: NEO4J_USER
    value: "neo4j"

  # --- NATS (native - 4222) ---
  - name: NATS_HOST
    value: "nats.isa-cloud-staging.svc.cluster.local"
  - name: NATS_PORT
    value: "4222"
  - name: NATS_URL
    value: "nats://nats.isa-cloud-staging.svc.cluster.local:4222"

  # --- MinIO (S3 - 9000) ---
  - name: MINIO_HOST
    value: "minio.isa-cloud-staging.svc.cluster.local"
  - name: MINIO_PORT
    value: "9000"
  - name: MINIO_SECURE
    value: "false"
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: minio-access-key
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: user-secrets
        key: minio-secret-key

  # --- MQTT (EMQX - 1883) ---
  - name: MQTT_HOST
    value: "emqx.isa-cloud-staging.svc.cluster.local"
  - name: MQTT_PORT
    value: "1883"

