# =============================================================================
# Per-service overrides for the new microservices (#462)
# =============================================================================
# These match the structure called for in the issue spec. The shared `env:`
# block above is injected into every service; the entries below are appended
# by callers that consume the per-service overrides (sub-chart render or
# overlay) so artifact-only knobs (ISA_MODEL_URL, ARTIFACT_DAILY_QUOTA, etc.)
# don't pollute unrelated services.
# =============================================================================
artifactService:
  enabled: true
  image:
    repository: isa/user-artifact
    tag: latest
  # Service-specific env (artifact_service.py / _invoke_isa_model):
  #   ISA_MODEL_URL, ISA_MCP_URL, ARTIFACT_DAILY_QUOTA,
  #   ARTIFACT_RUNTIME_MODEL, ARTIFACT_RUNTIME_PROVIDER,
  #   ARTIFACT_RUNTIME_RATE_PER_MINUTE, ARTIFACT_MCP_RATE_PER_MINUTE (PR #475)
  # POSTGRES_*, CONSUL_*, NATS_URL come from the shared env block.
  env:
    - name: ISA_MODEL_URL
      value: "http://isa-model.isa-cloud-staging.svc.cluster.local:8082"
    - name: ISA_MCP_URL
      value: "http://isa-mcp.isa-cloud-staging.svc.cluster.local:8081/mcp"
    - name: ARTIFACT_DAILY_QUOTA
      value: "200"
    - name: ARTIFACT_RUNTIME_MODEL
      value: "gpt-4.1-nano"
    - name: ARTIFACT_RUNTIME_PROVIDER
      value: "openai"
    # Per-minute caps from microservices/artifact_service/main.py (PR #475).
    # Staging uses the in-code defaults; tune up/down as load tests demand.
    - name: ARTIFACT_RUNTIME_RATE_PER_MINUTE
      value: "100"
    - name: ARTIFACT_MCP_RATE_PER_MINUTE
      value: "60"

projectSharingService:
  enabled: true
  image:
    repository: isa/user-project-sharing
    tag: latest
  # Service-specific env (project_sharing_service.py):
  #   PROJECT_SHARE_ACCEPT_BASE_URL
  # POSTGRES_*, CONSUL_*, NATS_URL come from the shared env block via
  # service discovery.
  env:
    - name: PROJECT_SHARE_ACCEPT_BASE_URL
      value: "https://staging.app.isa.dev/shares/accept"

connectorService:
  enabled: true
  image:
    repository: isa/user-connector
    tag: latest
  # Service-specific env (connector_service — xenoISA/isA_#464):
  #   ALLOW_CUSTOM_MCP_CONNECTORS — gate POST/DELETE/revalidate on /custom
  #   ALLOW_PRIVATE_MCP_HOSTS    — bypass private-IP block (dev only, must
  #                                 stay false in staging/production)
  #   CONNECTOR_USE_DEV_VAULT    — in-process secret stub; flip to false
  #                                 once the real vault_service wiring lands
  #   CONNECTOR_DEV_AUTH         — X-User-Id header fallback; off in staging
  # POSTGRES_*, CONSUL_*, NATS_URL come from the shared env block via
  # service discovery.
  env:
    - name: ALLOW_CUSTOM_MCP_CONNECTORS
      value: "true"
    - name: ALLOW_PRIVATE_MCP_HOSTS
      value: "false"
    - name: CONNECTOR_USE_DEV_VAULT
      value: "true"
    - name: CONNECTOR_DEV_AUTH
      value: "false"
