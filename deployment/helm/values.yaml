# =============================================================================
# ISA User Platform - Base Helm Values
# =============================================================================
# Minimal base values. Use environment-specific files for deployment.
#
# Deploy individual service:
#   helm upgrade --install user-auth-service \
#     ~/Documents/Fun/isA/isA_Cloud/deployments/charts/isa-service \
#     -f deployment/helm/values-staging.yaml \
#     --set name=user-auth-service \
#     --set image.repository=isa/user-auth \
#     --set port=8201 \
#     -n isa-cloud-staging
#
# Or deploy all services using the deploy script:
#   ./deployment/helm/deploy.sh staging
# =============================================================================

# Common settings for all user microservices
namespace: isa-cloud-staging

image:
  pullPolicy: Always
  tag: latest

health:
  path: /health
  initialDelaySeconds: 60
  periodSeconds: 10

service:
  type: ClusterIP

consul:
  enabled: true

# Database pool sizing defaults (epic #345 / story #346).
# Per-pod Postgres pool size scales with replica count:
#   max_pool_size = max(5, poolBase + (POD_REPLICA_COUNT - 1) * poolGrowth)
# Conservative defaults (base=2, growth=1) keep the cross-service connection
# budget plausible for ~35 microservices on a shared Postgres while the
# capacity plan (PgBouncer + max_connections raise) lands — see the tracking
# issue referenced in PR #358 and docs/runbooks/hpa-capacity.md (pending).
# Override per env via values-{staging,production}.yaml. Each environment
# also injects POD_REPLICA_COUNT, DB_POOL_BASE, DB_POOL_GROWTH env vars.
database:
  poolBase: 2
  poolGrowth: 1

# =============================================================================
# Pre-deploy Migration Job (issue #349, epic #345)
# =============================================================================
# Renders deployment/helm/templates/migration-job.yaml as a Helm
# `pre-install,pre-upgrade` hook. Helm waits for this Job to succeed before
# rolling out the service workloads. On failure, existing pods continue
# serving traffic uninterrupted (failed pre-hook = aborted upgrade).
#
# Override per-environment in values-staging.yaml / values-production.yaml.
# =============================================================================
migrationJob:
  enabled: true
  # Image used by the Job. SHOULD match the version being deployed so the
  # alembic scripts on disk match the schema the new pods expect.
  image:
    registry: harbor.local:30443
    repository: isa/user-base
    tag: latest
    pullPolicy: Always
  # Modest resource asks — Alembic is light. Bump if you have many
  # services/many migrations chained.
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # Fail fast — schema mismatches deserve human triage, not implicit retries.
  backoffLimit: 0
  # Hard cap on runtime. 600s is generous for the all-services Alembic chain;
  # increase if you have heavy data backfills.
  activeDeadlineSeconds: 600
  # Keep terminated Jobs around briefly so `kubectl logs job/...` works after
  # the hook completes. Failed Jobs persist regardless (no `hook-failed` in
  # the deletion policy) until manually cleaned.
  ttlSecondsAfterFinished: 86400
  # Optional: bind to a service account that has access to the DB secret.
  serviceAccountName: ""
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  # Extra env appended after the shared `.Values.env` block. Use this to add
  # migration-only flags (e.g., a higher LOG_LEVEL).
  extraEnv: []

