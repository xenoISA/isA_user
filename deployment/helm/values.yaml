# =============================================================================
# ISA User Platform - Base Helm Values
# =============================================================================
# Minimal base values. Use environment-specific files for deployment.
#
# Deploy individual service:
#   helm upgrade --install user-auth-service \
#     ~/Documents/Fun/isA/isA_Cloud/deployments/charts/isa-service \
#     -f deployment/helm/values-staging.yaml \
#     --set name=user-auth-service \
#     --set image.repository=isa/user-auth \
#     --set port=8201 \
#     -n isa-cloud-staging
#
# Or deploy all services using the deploy script:
#   ./deployment/helm/deploy.sh staging
# =============================================================================

# Common settings for all user microservices
namespace: isa-cloud-staging

image:
  pullPolicy: Always
  tag: latest

health:
  path: /health
  initialDelaySeconds: 60
  periodSeconds: 10

service:
  type: ClusterIP

consul:
  enabled: true

# =============================================================================
# Pre-deploy Migration Job (issue #349, epic #345)
# =============================================================================
# Renders deployment/helm/templates/migration-job.yaml as a Helm
# `pre-install,pre-upgrade` hook. Helm waits for this Job to succeed before
# rolling out the service workloads. On failure, existing pods continue
# serving traffic uninterrupted (failed pre-hook = aborted upgrade).
#
# Override per-environment in values-staging.yaml / values-production.yaml.
# =============================================================================
migrationJob:
  enabled: true
  # Image used by the Job. SHOULD match the version being deployed so the
  # alembic scripts on disk match the schema the new pods expect.
  image:
    registry: harbor.local:30443
    repository: isa/user-base
    tag: latest
    pullPolicy: Always
  # Modest resource asks — Alembic is light. Bump if you have many
  # services/many migrations chained.
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # Fail fast — schema mismatches deserve human triage, not implicit retries.
  backoffLimit: 0
  # Hard cap on runtime. 600s is generous for the all-services Alembic chain;
  # increase if you have heavy data backfills.
  activeDeadlineSeconds: 600
  # Keep terminated Jobs around briefly so `kubectl logs job/...` works after
  # the hook completes. Failed Jobs persist regardless (no `hook-failed` in
  # the deletion policy) until manually cleaned.
  ttlSecondsAfterFinished: 86400
  # Optional: bind to a service account that has access to the DB secret.
  serviceAccountName: ""
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  # Extra env appended after the shared `.Values.env` block. Use this to add
  # migration-only flags (e.g., a higher LOG_LEVEL).
  extraEnv: []

# =============================================================================
# Canary Rollout (issue #350, epic #345)
# =============================================================================
# Renders deployment/helm/templates/rollout.yaml (Argo Rollouts CR) and
# deployment/helm/templates/analysis-template.yaml (Prometheus analysis)
# for every service in `.Values.services` when `enabled` is true.
#
# Defaults below match the AC on issue #350:
#   - 1-replica canary with a 60s health gate
#   - 10/25/50/100 traffic ramp
#   - Prometheus error-rate >1% OR p95 latency >1.5x baseline triggers
#     auto-rollback (single breach aborts: `failureLimit: 0`).
#
# Override per-environment:
#   - values-production.yaml flips `enabled: true`
#   - values-staging.yaml keeps it `false` (use simpler kubectl rollout)
# =============================================================================
rollout:
  enabled: false
  # How long the 1-replica canary bakes before any traffic is split.
  healthGateSeconds: 60
  # Pause between weight bumps (gives analysis a fresh window).
  stagePauseSeconds: 30
  # Argo's surge / unavailable knobs during the canary ramp.
  maxSurge: "25%"
  maxUnavailable: 0
  scaleDownDelaySeconds: 30
  revisionHistoryLimit: 5
  # Image-pull secrets for the Rollout's Pod template.
  imagePullSecrets: []
  # Set this to enable L7 traffic splitting via a service mesh / ingress
  # (Istio, SMI, Gateway API, ALB, Nginx, ...). Leave empty to use the
  # built-in replica-weighted "basic canary" mode that needs no mesh.
  trafficRouting: {}
  # Override `steps` to ship a custom ramp for a specific service tier
  # (e.g., a noisy background worker that wants a faster promotion).
  # Leave empty to render the default 1-replica -> 60s -> 10/25/50/100
  # ramp from templates/rollout.yaml.
  steps: []
  # Prometheus analysis knobs, consumed by templates/analysis-template.yaml.
  analysis:
    prometheusAddress: "http://prometheus-server.monitoring.svc.cluster.local:9090"
    # Auto-rollback when 5xx rate exceeds 1% of total RPS over `window`.
    errorRateThreshold: "0.01"
    # Auto-rollback when canary p95 latency > 1.5x the stable replica set.
    latencyRatioThreshold: "1.5"
    # How frequently each metric is sampled inside one analysis run.
    interval: "30s"
    # Number of samples per analysis run before passing the gate.
    count: 3
    # Time window each Prometheus query looks back over.
    window: "2m"

