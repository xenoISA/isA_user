# =============================================================================
# ISA User Platform - Base Helm Values
# =============================================================================
# Minimal base values. Use environment-specific files for deployment.
#
# Deploy individual service:
#   helm upgrade --install user-auth-service \
#     ~/Documents/Fun/isA/isA_Cloud/deployments/charts/isa-service \
#     -f deployment/helm/values-staging.yaml \
#     --set name=user-auth-service \
#     --set image.repository=isa/user-auth \
#     --set port=8201 \
#     -n isa-cloud-staging
#
# Or deploy all services using the deploy script:
#   ./deployment/helm/deploy.sh staging
# =============================================================================

# Common settings for all user microservices
namespace: isa-cloud-staging

image:
  pullPolicy: Always
  tag: latest

health:
  path: /health
  initialDelaySeconds: 60
  periodSeconds: 10

service:
  type: ClusterIP

consul:
  enabled: true

# =============================================================================
# Pre-deploy Migration Job (issue #349, epic #345)
# =============================================================================
# Renders deployment/helm/templates/migration-job.yaml as a Helm
# `pre-install,pre-upgrade` hook. Helm waits for this Job to succeed before
# rolling out the service workloads. On failure, existing pods continue
# serving traffic uninterrupted (failed pre-hook = aborted upgrade).
#
# Override per-environment in values-staging.yaml / values-production.yaml.
# =============================================================================
migrationJob:
  enabled: true
  # Image used by the Job. SHOULD match the version being deployed so the
  # alembic scripts on disk match the schema the new pods expect.
  image:
    registry: harbor.local:30443
    repository: isa/user-base
    tag: latest
    pullPolicy: Always
  # Modest resource asks — Alembic is light. Bump if you have many
  # services/many migrations chained.
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # Fail fast — schema mismatches deserve human triage, not implicit retries.
  backoffLimit: 0
  # Hard cap on runtime. 600s is generous for the all-services Alembic chain;
  # increase if you have heavy data backfills.
  activeDeadlineSeconds: 600
  # Keep terminated Jobs around briefly so `kubectl logs job/...` works after
  # the hook completes. Failed Jobs persist regardless (no `hook-failed` in
  # the deletion policy) until manually cleaned.
  ttlSecondsAfterFinished: 86400
  # Optional: bind to a service account that has access to the DB secret.
  serviceAccountName: ""
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  # Extra env appended after the shared `.Values.env` block. Use this to add
  # migration-only flags (e.g., a higher LOG_LEVEL).
  extraEnv: []

# =============================================================================
# HorizontalPodAutoscaler — KEDA ScaledObjects (issue #352, epic #345)
# =============================================================================
# This block configures the per-service KEDA ScaledObject rendered by
# `templates/hpa.yaml`. KEDA itself is NOT installed by this chart — the
# cluster operator must run `helm install keda kedacore/keda -n keda
# --create-namespace` before `hpa.enabled=true` is rolled out. See
# docs/runbooks/hpa-metrics.md and docs/adr/0001-hpa-custom-metrics-tooling.md.
#
# Tier-based defaults map a service-class onto a trigger preset:
#   * `event`     — NATS JetStream queue depth (wallet/billing/payment)
#   * `auth`      — Prometheus p95 request latency (auth/account/authorization)
#   * `telemetry` — Prometheus WebSocket connection count or msg rate
#   * `default`   — CPU/memory only (every other service)
#
# Each ScaledObject ALWAYS includes the CPU+memory fallback triggers, so a
# stuck custom-metric collector still scales on raw load.
#
# Override examples:
#   services.wallet.hpa.tier: event           # change preset
#   services.payment.hpa.maxReplicas: 20       # raise ceiling
#   services.auth.hpa.triggers: [...]          # custom inline trigger list
#   services.notification.hpa.enabled: false   # opt out a single service
# =============================================================================
hpa:
  # Disabled by default at chart level. values-staging.yaml leaves this off;
  # values-production.yaml flips it on.
  enabled: false
  # Chart-wide defaults — per-service overrides win.
  minReplicas: 2
  maxReplicas: 10
  # KEDA polling cadence and cool-down. 30s polling matches our Prometheus
  # scrape interval; 300s cooldown keeps scale-down from oscillating during
  # short post-burst lulls.
  pollingInterval: 30
  cooldownPeriod: 300
  scaleDownStabilization: 300
  # Fallback ceilings — applied in addition to any custom trigger.
  fallbackCPUUtilization: 70
  fallbackMemoryUtilization: 80
  # Tier presets. Override a service's tier via `services.<name>.hpa.tier`.
  # `metadata.serverAddress` / `metadata.value` reference cluster-internal DNS
  # — values-{staging,production}.yaml override host strings as needed.
  tiers:
    default:
      triggers: []
    event:
      triggers:
        - type: nats-jetstream
          metricType: AverageValue
          metadata:
            natsServerMonitoringEndpoint: "nats.isa-cloud-prod.svc.cluster.local:8222"
            account: "$G"
            stream: "isa-events"
            consumer: "isa-user-consumer"
            lagThreshold: "100"
            useHttps: "false"
    auth:
      triggers:
        - type: prometheus
          metricType: AverageValue
          metadata:
            serverAddress: "http://prometheus.isa-cloud-prod.svc.cluster.local:9090"
            metricName: "isa_user_request_latency_p95_seconds"
            threshold: "0.5"
            query: |
              histogram_quantile(0.95,
                sum(rate(isa_user_http_request_duration_seconds_bucket{service="__SVC__"}[2m])) by (le))
    telemetry:
      triggers:
        - type: prometheus
          metricType: AverageValue
          metadata:
            serverAddress: "http://prometheus.isa-cloud-prod.svc.cluster.local:9090"
            metricName: "isa_user_websocket_active_connections"
            threshold: "500"
            query: |
              sum(isa_user_websocket_active_connections{service="__SVC__"})

